site_name: subject-LFIQA User Manual
site_description: User manual for the subjective light field image quality assessment software v3.0
site_author: IMCL
repo_url: https://github.com/USTC-IMCL/subject-LFIQA-software
repo_name: USTC-IMCL/subject-LFIQA-software
edit_uri: ""

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: en

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - Experiment JSON: experiment-json.md
  - Operations: software-operation.md
  - Advanced: advanced.md
  - FAQ: faq.md
