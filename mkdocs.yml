site_name: subject-LFIQA 用户手册
site_description: 主观光场图像质量评估软件使用说明 v3.0
site_author: IMCL
repo_url: https://github.com/USTC-IMCL/subject-LFIQA-software
repo_name: USTC-IMCL/subject-LFIQA-software
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: zh

nav:
  - 首页: index.md
  - 安装: installation.md
  - 快速上手: quick-start.md
  - 实验 JSON 配置: experiment-json.md
  - 软件操作说明: software-operation.md
  - 进阶主题: advanced.md
  - 常见问题: faq.md
